<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html,body{margin:0;height:100%;background:#1b1b1b;overflow:hidden}
  #c{width:100vw;height:100vh;display:block}
  #hud{position:fixed;left:12px;top:10px;font:12px/1.5 Segoe UI,sans-serif;color:#cfcfcf;
       text-shadow:0 1px 2px #000;pointer-events:none}
  #hud .warn{color:#ffcc66}
  #empty{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
          color:#777;font:15px Segoe UI,sans-serif;pointer-events:none}
  #player{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);display:none;align-items:center;gap:8px;
          background:rgba(32,32,32,0.82);border:1px solid #444;border-radius:22px;padding:6px 14px 6px 8px;
          font:12px Segoe UI,sans-serif;color:#ddd;backdrop-filter:blur(4px)}
  #player button{width:30px;height:30px;border-radius:50%;border:none;background:#3a3a3a;color:#eee;
          font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #player button:hover{background:#4a4a4a}
  #player #animName{margin-left:4px;color:#aaa;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #gizmobar{position:fixed;right:12px;top:10px;display:none;gap:4px;
          background:rgba(32,32,32,0.82);border:1px solid #444;border-radius:8px;padding:4px;
          font:12px Segoe UI,sans-serif;backdrop-filter:blur(4px)}
  #gizmobar button{min-width:54px;height:26px;border:none;border-radius:5px;background:#3a3a3a;color:#cfcfcf;
          cursor:pointer;padding:0 8px}
  #gizmobar button:hover{background:#4a4a4a}
  #gizmobar button.on{background:#5a7ddd;color:#fff}
</style>
<script src="vendor/three.min.js"></script>
<script src="vendor/GLTFLoader.js"></script>
<script src="vendor/OBJLoader.js"></script>
<script src="vendor/OrbitControls.js"></script>
<script src="vendor/TransformControls.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud"></div>
<div id="empty">Drop or select a .glb to preview</div>
<div id="gizmobar">
  <button data-m="translate" class="on" title="Move (W)">Move</button>
  <button data-m="rotate" title="Rotate yaw (E)">Rotate</button>
  <button data-m="scale" title="Scale uniform (R)">Scale</button>
</div>
<div id="player">
  <button id="btnPlay" title="play / pause">⏸</button>
  <button id="btnReset" title="reset">⟲</button>
  <span id="animName"></span>
</div>
<script>
const host=(window.chrome&&window.chrome.webview)?window.chrome.webview:null;
function post(m){ if(host) host.postMessage(JSON.stringify(m)); }

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(devicePixelRatio||1);
renderer.outputEncoding=THREE.sRGBEncoding;
const scene=new THREE.Scene(); scene.background=new THREE.Color(0x1b1b1b);
const camera=new THREE.PerspectiveCamera(40,1,0.01,100000);
const controls=new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08; controls.zoomSpeed=1.2;
// VAM operation habit (baseline before Settings push): left+middle pan, right orbits, wheel zooms
controls.mouseButtons.LEFT   = THREE.MOUSE.PAN;
controls.mouseButtons.MIDDLE = THREE.MOUSE.PAN;
controls.mouseButtons.RIGHT  = THREE.MOUSE.ROTATE;
// per-button navigation override from Settings ({left,middle,right} each "orbit"|"pan"|"zoom"); wheel always zooms
const NAV_ACT={orbit:THREE.MOUSE.ROTATE, pan:THREE.MOUSE.PAN, zoom:THREE.MOUSE.DOLLY};
function applyNav(nav){
  if(!nav) return;
  if(nav.left   in NAV_ACT) controls.mouseButtons.LEFT   = NAV_ACT[nav.left];
  if(nav.middle in NAV_ACT) controls.mouseButtons.MIDDLE = NAV_ACT[nav.middle];
  if(nav.right  in NAV_ACT) controls.mouseButtons.RIGHT  = NAV_ACT[nav.right];
}
scene.add(new THREE.HemisphereLight(0xffffff,0x404040,1.0));
const dir=new THREE.DirectionalLight(0xffffff,1.1); dir.position.set(3,5,4); scene.add(dir);
const grid=new THREE.GridHelper(10,20,0x555555,0x383838); scene.add(grid);
// prominent origin (0,0,0) marker: yellow node + axes + ground ring
const originGroup=new THREE.Group(); scene.add(originGroup);
originGroup.add(new THREE.Mesh(new THREE.SphereGeometry(0.05,16,12), new THREE.MeshBasicMaterial({color:0xffd54a})));
originGroup.add(new THREE.AxesHelper(0.7));
const oRing=new THREE.Mesh(new THREE.RingGeometry(0.13,0.17,40), new THREE.MeshBasicMaterial({color:0xffd54a,side:THREE.DoubleSide,transparent:true,opacity:0.85}));
oRing.rotation.x=-Math.PI/2; oRing.position.y=0.002; originGroup.add(oRing);

const hud=document.getElementById('hud'), empty=document.getElementById('empty');

// ---- persistent scene objects (loaded/created once, transformed on param change) ----
const modelHolder=new THREE.Group(); scene.add(modelHolder);   // the glb lives here
let rawSize=new THREE.Vector3(1,1,1);                          // model bounds BEFORE any holder transform
let haveModel=false, lastMeta=null, gen=0;
// centering/scale components from the last applyParams — used to invert gizmo drags back into pos/yaw/height params
let _centerOff={cx:0, fy:0, cz:0, scl:1};
let modelMats=[];   // {m, t, dw, at} original transparency per material — to toggle Force-opaque live
let matByName={};   // material name -> three material (for per-material live editing from the Advanced editor)
// animation: auto-play on load; player bar (play/pause/reset) shown only when the model has clips
const clock=new THREE.Clock();
let mixer=null, animClips=[], action=null, animPlaying=false, animSel=0, animPing=false;
const playerEl=document.getElementById('player'), btnPlay=document.getElementById('btnPlay');
function stopAnim(){ if(mixer){ mixer.stopAllAction(); mixer=null; } action=null; animClips=[]; animPlaying=false; animSel=0; playerEl.style.display='none'; }
function setClip(i){
  if(!mixer||!animClips.length) return;
  const ni=Math.max(0,Math.min(i|0, animClips.length-1));
  if(action && ni===animSel) return;
  if(action) action.stop();
  animSel=ni; action=mixer.clipAction(animClips[ni]); action.paused=!animPlaying;
  action.setLoop(animPing?THREE.LoopPingPong:THREE.LoopRepeat, Infinity); action.play();
  document.getElementById('animName').textContent=(animClips[ni].name||('clip '+ni))+(animClips.length>1?`  ·  ${ni+1}/${animClips.length}`:'');
}
btnPlay.onclick=()=>{ if(!action)return; animPlaying=!animPlaying; action.paused=!animPlaying; btnPlay.textContent=animPlaying?'⏸':'▶'; };
document.getElementById('btnReset').onclick=()=>{ if(mixer) mixer.setTime(0); };

const personHolder=new THREE.Group(); personHolder.visible=false; scene.add(personHolder);
let personW=0.5, personLoading=false, personLoaded=false, personUrlWanted=null;

let spin=false, lastNormalize=null;
// fit the camera to the whole scene; near/far scaled to the model so huge/tiny models stay visible
function frameModel(){
  const whole=new THREE.Box3(); whole.expandByObject(modelHolder); if(personHolder.visible) whole.expandByObject(personHolder);
  if(whole.isEmpty()) return;
  const c=whole.getCenter(new THREE.Vector3()), s=whole.getSize(new THREE.Vector3());
  const r=Math.max(s.x,s.y,s.z)*0.5||1, d=r/Math.tan(THREE.MathUtils.degToRad(camera.fov)/2)*1.8;
  controls.target.copy(c);
  camera.position.set(c.x+d*0.6, c.y+r*0.8, c.z+d*0.9);
  camera.near=Math.max(0.001, r/1000); camera.far=(d+r)*8; camera.updateProjectionMatrix();
  controls.update();
}
renderer.domElement.addEventListener('dblclick', frameModel);   // double-click to re-fit (handy for huge models)
// F key = frame / fit to view (Maya/Blender muscle memory); ignore when a form field is focused or a modifier is held
addEventListener('keydown', e=>{
  if(e.ctrlKey||e.altKey||e.metaKey) return;
  if((e.key==='f'||e.key==='F') && !/^(input|textarea|select)$/i.test((e.target&&e.target.tagName)||'')) frameModel();
});

function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize();

// ---- transform gizmo (W=move · E=rotate yaw · R=scale uniform). Drives the model live, posts params back to the host. ----
// Translate → posX/Y/Z · Rotate → yaw (Y ring only) · Scale → uniform, drives target Height (auto-enables Normalize).
// The host rounds on write too (belt-and-suspenders); X is negated to match VAM's convention (same as applyParams).
const GIZMO_SNAP_T=0.01, GIZMO_SNAP_R=1*Math.PI/180;
const gizmobar=document.getElementById('gizmobar');
const gizmo=new THREE.TransformControls(camera, renderer.domElement);
gizmo.setSpace('local'); gizmo.setSize(0.85);
gizmo.setTranslationSnap(GIZMO_SNAP_T); gizmo.setRotationSnap(GIZMO_SNAP_R);
gizmo.visible=false; scene.add(gizmo);
let _uiMode='translate';
gizmo.addEventListener('dragging-changed', e=>{ controls.enabled=!e.value; });   // don't orbit while dragging a handle

function refreshGizmo(){
  if(!haveModel){ gizmo.detach(); gizmo.visible=false; gizmobar.style.display='none'; return; }
  gizmo.attach(modelHolder); gizmobar.style.display='flex';
  if(_uiMode==='rotate'){ gizmo.setMode('rotate'); gizmo.showX=false; gizmo.showY=true; gizmo.showZ=false; }   // yaw only
  else if(_uiMode==='scale'){ gizmo.setMode('scale'); gizmo.showX=true; gizmo.showY=true; gizmo.showZ=true; }   // any handle → uniform
  else { gizmo.setMode('translate'); gizmo.showX=true; gizmo.showY=true; gizmo.showZ=true; }
  gizmo.visible=true;
}
function updateModeUI(){ for(const b of gizmobar.children) b.classList.toggle('on', b.dataset.m===_uiMode); }
function setGizmoMode(m){ _uiMode=m; refreshGizmo(); updateModeUI(); }
for(const b of gizmobar.children) b.onclick=()=>setGizmoMode(b.dataset.m);
addEventListener('keydown', e=>{
  if(e.ctrlKey||e.altKey||e.metaKey) return;
  if(/^(input|textarea|select)$/i.test((e.target&&e.target.tagName)||'')) return;
  if(e.key==='w'||e.key==='W') setGizmoMode('translate');
  else if(e.key==='e'||e.key==='E') setGizmoMode('rotate');
  else if(e.key==='r'||e.key==='R') setGizmoMode('scale');
});

gizmo.addEventListener('objectChange', ()=>{
  if(!haveModel || !window.__opts) return;
  if(_uiMode==='translate'){
    const p=modelHolder.position;   // invert applyParams' placement: px = -position.x - cx, py = position.y + fy, pz = position.z + cz
    const px=Math.round((-p.x - _centerOff.cx)*1000)/1000;
    const py=Math.round(( p.y + _centerOff.fy)*1000)/1000;
    const pz=Math.round(( p.z + _centerOff.cz)*1000)/1000;
    window.__opts.posX=px; window.__opts.posY=py; window.__opts.posZ=pz;   // keep JS state so later param pushes don't snap back
    post({type:'gizmo', pos:[px,py,pz]});
  } else if(_uiMode==='rotate'){
    let yaw=modelHolder.rotation.y*180/Math.PI; yaw=Math.round(((yaw%360)+360)%360);   // Y ring → yaw, normalized [0,360)
    window.__opts.yaw=yaw; applyParams(window.__opts);   // re-apply re-establishes floor/centering for the new orientation
    post({type:'gizmoRot', yaw});
  } else if(_uiMode==='scale'){
    const ax=gizmo.axis||'';   // read the dragged axis' scalar, then force uniform via applyParams (height drives setScalar)
    const s = ax==='Y'?modelHolder.scale.y : ax==='Z'?modelHolder.scale.z : modelHolder.scale.x;
    const h=Math.max(0.02, Math.round(s*rawSize.y*1000)/1000);
    window.__opts.height=h; window.__opts.normalize=true; applyParams(window.__opts);
    post({type:'gizmoScale', height:h});
  }
});

function loadPersonRef(url, cb){
  if(personLoaded){ if(cb)cb(); return; }
  if(personLoading){ personUrlWanted=url; return; }
  personLoading=true;
  new THREE.OBJLoader().load(url,(obj)=>{
    const rm=new THREE.MeshStandardMaterial({color:0xdddddd,transparent:true,opacity:0.4,roughness:0.95,side:THREE.DoubleSide});
    obj.traverse(o=>{ if(o.isMesh)o.material=rm; });
    const b=new THREE.Box3().setFromObject(obj), c=b.getCenter(new THREE.Vector3()), s=b.getSize(new THREE.Vector3());
    obj.position.x-=c.x; obj.position.z-=c.z; obj.position.y-=b.min.y;   // center XZ, floor
    personHolder.add(obj); personW=s.x; personLoaded=true; personLoading=false;
    if(cb)cb();
  },undefined,()=>{ personLoading=false; });
}

// apply height/yaw/ref to the ALREADY-loaded model — cheap, synchronous, no reload
function applyParams(p){
  if(!haveModel) return;
  const normalize=!!p.normalize, TH=parseFloat(p.height||0)||0, yaw=(parseFloat(p.yaw||0)||0)*Math.PI/180;
  const showRef=!!p.showRef;            // explicit toggle; p.refobj is just the URL to lazy-load when shown
  spin=!!p.spin;
  if(mixer && p.pingpong!=null){ animPing=!!p.pingpong; if(action) action.setLoop(animPing?THREE.LoopPingPong:THREE.LoopRepeat, Infinity); }
  if(mixer && p.animIndex!=null) setClip(parseInt(p.animIndex)||0);   // clip selection (also drives the bake)
  // Force-opaque (Advanced "try auto-fix"): render all materials solid, matching the FORCE_OPAQUE bake
  const fo=!!p.forceOpaque;
  modelMats.forEach(e=>{ e.m.transparent=fo?false:e.t; e.m.depthWrite=fo?true:e.dw; e.m.alphaTest=fo?0:e.at; e.m.needsUpdate=true; });
  // vertex colours: OFF = grey (matches VAM Standard, which ignores COLOR_0); ON = show them
  if(p.vertexColor!=null) modelMats.forEach(e=>{ e.m.vertexColors=!!p.vertexColor; e.m.needsUpdate=true; });
  // per-material live edits from the Advanced editor (more specific than force-opaque)
  if(p.matOverrides) for(const nm in p.matOverrides){ const x=matByName[nm]; if(!x) continue; const o=p.matOverrides[nm];
    if(o.color!=null && x.color) x.color.set(o.color);
    if(o.metallic!=null && x.metalness!=null) x.metalness=+o.metallic;
    if(o.smoothness!=null){ if(x.roughness!=null) x.roughness=1-(+o.smoothness); else if('glossiness' in x) x.glossiness=+o.smoothness; }
    if(o.emission!=null && x.emissive) x.emissive.set(o.emission);
    if(o.emissionIntensity!=null && 'emissiveIntensity' in x) x.emissiveIntensity=+o.emissionIntensity;
    if(o.normalScale!=null && x.normalScale) x.normalScale.set(+o.normalScale,+o.normalScale);
    if(o.twoSided!=null) x.side=o.twoSided?THREE.DoubleSide:THREE.FrontSide;
    if(o.mode==='opaque'){ x.transparent=false; x.depthWrite=true; x.alphaTest=0; }
    else if(o.mode==='cutout'){ x.transparent=false; x.depthWrite=true; x.alphaTest=(o.cutoff!=null?+o.cutoff:0.5); }
    else if(o.mode==='fade'){ x.transparent=true; x.depthWrite=false; x.alphaTest=0; }
    else if(o.cutoff!=null && x.alphaTest>0) x.alphaTest=+o.cutoff;
    x.needsUpdate=true; }

  const px=parseFloat(p.posX||0)||0, py=parseFloat(p.posY||0)||0, pz=parseFloat(p.posZ||0)||0;
  modelHolder.scale.setScalar(1); modelHolder.rotation.set(0,0,0); modelHolder.position.set(0,0,0);
  let scl=1; if(normalize && TH>0 && rawSize.y>0) scl=TH/rawSize.y;
  modelHolder.scale.setScalar(scl);
  modelHolder.rotation.y=yaw;
  modelHolder.updateMatrixWorld(true);
  let box=new THREE.Box3().setFromObject(modelHolder);
  const c=box.getCenter(new THREE.Vector3());
  // center XZ + floor at origin, then apply the user's position offset (relative to 0,0,0).
  // X is negated so the preview matches VAM's convention (VAM +X moves screen-left); engine bake is already correct.
  modelHolder.position.x += -px - c.x;
  modelHolder.position.y += py - box.min.y;
  modelHolder.position.z += pz - c.z;
  modelHolder.updateMatrixWorld(true);
  // remember the centering-only component (canonical placement before the user offset) so the gizmo can
  // invert a dragged world transform back into px/py/pz: position.x = -px - cx, .y = py - fy, .z = pz - cz
  _centerOff={cx:c.x, fy:box.min.y, cz:c.z, scl};

  // person reference anchored AT origin (0,0,0) so it OVERLAPS the model for direct height comparison
  personHolder.visible=showRef && personLoaded;
  if(showRef){
    if(!personLoaded && p.refobj) loadPersonRef(p.refobj, ()=>applyParams(p));
    if(personLoaded) personHolder.position.set(0,0,0);
  }

  // auto-fit when the Normalize toggle flips (ON/OFF reframes to the new size); skip the first apply (load already frames)
  if(lastNormalize!==null && lastNormalize!==normalize) frameModel();
  lastNormalize=normalize;

  controls.autoRotate=spin;   // OrbitControls handles orbit/zoom/pan; camera framing is on load + dblclick/F key

  if(lastMeta){
    const w=lastMeta.warns&&lastMeta.warns.length?` <span class="warn">⚠ ${lastMeta.warns.join(' · ')}</span>`:'';
    hud.innerHTML=`${lastMeta.model}<br>aabb ${rawSize.x.toFixed(2)} × ${rawSize.y.toFixed(2)} × ${rawSize.z.toFixed(2)} m`
      +`   ${normalize?('→ '+(rawSize.y*scl).toFixed(2)+' m'):'(real size)'}   yaw ${(yaw*180/Math.PI).toFixed(0)}°`
      +`${(px||py||pz)?`   pos ${px}, ${py}, ${pz}`:''}`
      +`<br>meshes ${lastMeta.meshes} · materials ${lastMeta.materials.length} · anims ${lastMeta.anims.length}${w}`;
  }
  window.__applied=(window.__applied||0)+1;
  window.__refCount=personHolder.visible?personHolder.children.length:0;
}

function loadModel(opts){
  if(!opts.url && !opts.b64) return;
  const myGen=++gen;
  hud.textContent='loading…';
  const onGltf=(gltf)=>{
    if(myGen!==gen) return;                       // a newer load superseded this one
    // clear previous model
    for(let i=modelHolder.children.length-1;i>=0;i--){ const ch=modelHolder.children[i];
      modelHolder.remove(ch); ch.traverse(o=>{ if(o.geometry)o.geometry.dispose(); }); }
    const model=gltf.scene;
    const b=new THREE.Box3().setFromObject(model); rawSize=b.getSize(new THREE.Vector3());
    // bake model so holder-local origin = model centered on floor at native scale
    const c=b.getCenter(new THREE.Vector3());
    model.position.x-=c.x; model.position.z-=c.z; model.position.y-=b.min.y;
    modelHolder.add(model); haveModel=true; empty.style.display='none';

    // animation: auto-play the first (or selected) clip, reveal the player bar
    stopAnim();
    if((gltf.animations||[]).length){
      animClips=gltf.animations; mixer=new THREE.AnimationMixer(model);
      animPlaying=true; animSel=-1; btnPlay.textContent='⏸'; playerEl.style.display='flex';
      setClip(parseInt(opts.animIndex||0)||0);
      clock.getDelta();   // swallow accumulated time so the first frame delta isn't huge
    }

    const mats=new Set(); let meshes=0, tris=0, hasVColor=false, textured=false; const warns=[]; modelMats=[]; matByName={}; const matData=[];
    model.traverse(o=>{ if(o.isMesh){ meshes++;
        const ge=o.geometry; if(ge) tris += (ge.index? ge.index.count : (ge.attributes.position? ge.attributes.position.count : 0))/3;
        if(ge && ge.attributes && ge.attributes.color) hasVColor=true;
        const m=o.material;
      (Array.isArray(m)?m:[m]).forEach(x=>{ if(x){ const nm=x.name||'(unnamed)'; mats.add(nm);
        if(x.map||x.normalMap||x.metalnessMap||x.roughnessMap||x.emissiveMap||x.specularMap) textured=true;
        x.side=THREE.FrontSide;   // engine default is single-sided; match it (two-sided is opt-in per material)
        modelMats.push({m:x, t:x.transparent, dw:x.depthWrite, at:x.alphaTest||0});
        if(x.transparent&&!warns.includes('transparent'))warns.push('transparent');
        if(!matByName[nm]){ matByName[nm]=x;
          const sm=(x.roughness!=null)?+(1-x.roughness).toFixed(2):(x.glossiness!=null?+x.glossiness.toFixed(2):0.5);
          const emiHex=x.emissive?x.emissive.getHexString():'000000';
          const emissive=emiHex!=='000000';
          const at=+(x.alphaTest||0).toFixed(2);
          const type=x.transparent?'blend':(at>0?'cutout':(emissive?'emissive':'opaque'));
          matData.push({ name:nm, type, hasMetal:(x.metalness!=null),
            metallic:(x.metalness!=null?+x.metalness.toFixed(2):0), smoothness:sm,
            color:'#'+(x.color?x.color.getHexString():'ffffff'), emission:'#'+emiHex,
            emissionIntensity:+(x.emissiveIntensity||1).toFixed(2),
            mode:(x.transparent?'fade':(at>0?'cutout':'opaque')), cutoff:at||0.5,
            twoSided:false }); } }}); }});
    const anims=(gltf.animations||[]).map(a=>a.name||'(clip)'); if(anims.length>1)warns.push(anims.length+' anims');
    lastMeta={type:'ready',model:(opts.name||'model'),aabb:[rawSize.x,rawSize.y,rawSize.z],meshes,tris:Math.round(tris),materials:[...mats],matData,anims,warns,hasVColor,textureless:!textured};

    const done=()=>{ applyParams(opts); frameModel(); refreshGizmo(); window.__ready=lastMeta; post(lastMeta); };
    if(opts.refobj && !personLoaded) loadPersonRef(opts.refobj, done); else done();
  };
  const onErr=(e)=>{ if(myGen!==gen)return; hud.innerHTML='<span class="warn">load error: '+(e&&e.message||e)+'</span>';
    window.__ready={type:'error',error:String(e&&e.message||e)}; post(window.__ready); };
  const loader=new THREE.GLTFLoader();
  if(opts.b64){ try{ const bin=Uint8Array.from(atob(opts.b64),c=>c.charCodeAt(0)); loader.parse(bin.buffer,'',onGltf,onErr); }catch(ex){ onErr(ex); } }
  else loader.load(opts.url,onGltf,undefined,onErr);
  window.__opts=opts;   // remember last for param-only updates
}

window.loadModel=loadModel; window.applyParams=applyParams;

// gentle turntable
(function loop(){
  const dt=clock.getDelta(); if(mixer) mixer.update(dt);
  window.__animTime=action?action.time:-1; window.__animSel=animSel; window.__animCount=animClips.length;
  controls.update();
  renderer.render(scene,camera); requestAnimationFrame(loop);
})();

// ---- inputs ----
if(host){
  host.addEventListener('message', e=>{
    let d; try{ d=JSON.parse(e.data); }catch(_){ d=e.data; }
    if(!d) return;
    if(d.nav) applyNav(d.nav);   // apply navigation mapping on any message that carries it (load/params/nav)
    if(d.cmd==='load') loadModel(d);
    else if(d.cmd==='nav'){ /* mapping already applied above; nothing else to do */ }
    else if(d.cmd==='params'){ if(window.__opts){ Object.assign(window.__opts,d); applyParams(window.__opts); } }
    else if(d.cmd==='clear'){ stopAnim(); for(let i=modelHolder.children.length-1;i>=0;i--)modelHolder.remove(modelHolder.children[i]);
      haveModel=false; personHolder.visible=false; empty.style.display='flex'; hud.textContent=''; refreshGizmo(); }
    else if(d.cmd==='toobig'){ stopAnim(); for(let i=modelHolder.children.length-1;i>=0;i--)modelHolder.remove(modelHolder.children[i]);
      haveModel=false; personHolder.visible=false; empty.style.display='flex'; hud.innerHTML='<span class="warn">'+(d.msg||'too large for live preview')+'</span>'; refreshGizmo(); }
  });
  post({type:'host-ready'});
}
const P=new URLSearchParams(location.search);
if(P.get('model')) loadModel({url:P.get('model'),name:P.get('model').split('/').pop(),
  normalize:P.get('height')?true:false,height:P.get('height'),yaw:P.get('yaw'),refobj:P.get('refobj')||'',showRef:P.get('ref')!=='0'});
</script>
